services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quickbuild
      POSTGRES_PASSWORD: quickbuild
      POSTGRES_DB: quickbuild
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickbuild"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://quickbuild:quickbuild@postgres:5432/quickbuild
      REDIS_URL: redis://redis:6379/0
      APP_SECRET: change-me-in-production-use-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg://quickbuild:quickbuild@postgres:5432/quickbuild
      REDIS_URL: redis://redis:6379/0
      APP_SECRET: change-me-in-production-use-long-random-string
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://quickbuild:quickbuild@postgres:5432/quickbuild
      REDIS_URL: redis://redis:6379/0
      APP_SECRET: change-me-in-production-use-long-random-string
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/css:/usr/share/nginx/html/css:ro
      - ./frontend/js:/usr/share/nginx/html/js:ro
    depends_on:
      - api

volumes:
  pgdata:
